# lago-integration-sample configuration
# Environment variables can be referenced as ${VAR_NAME} or ${VAR_NAME:default_value}

lago:
  api_url: "${LAGO_API_URL:http://localhost:3000}"
  api_key: "${LAGO_API_KEY}"

cost_management:
  base_url: "${KOKU_BASE_URL:https://console.redhat.com/api/cost-management/v1}"
  # Authentication (choose one):
  # Option A: OAuth2 service account (for SaaS / console.redhat.com)
  client_id: "${COSTMGMT_CLIENT_ID:}"
  client_secret: "${COSTMGMT_CLIENT_SECRET:}"
  token_url: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
  # Option B: x-rh-identity header (for local dev mode)
  identity: "${KOKU_IDENTITY:}"
  org_id: "org_12345"

# ─── State database ───────────────────────────────────────────────
# Path to the SQLite state database. Tracks what has been synced and stores
# event cost fingerprints for change detection.
# Default: ~/.lago-sync/state.db
# Override via LAGO_SYNC_STATE_DB env var or this config key.
# state_db_path: "/var/lib/lago-sync/state.db"

sync:
  # Generate separate overhead line items for OpenShift distributed costs
  ocp_include_overhead: true

  # Invoice itemization: which dimensions produce separate line items on the Lago invoice.
  # Each key below is a provider, and the value is the list of event properties to group by.
  # If omitted, defaults are used (shown below). Set to [] for a single totaled line item.
  # After changing, run: lago-sync bootstrap --update
  invoice_group_by:
    aws: ["account", "service"]
    azure: ["subscription_guid", "service_name"]
    gcp: ["account", "service"]
    openshift: ["project", "cluster"]

# Each customer represents a billable entity in Lago.
# Resources define which Cost Management data belongs to that customer.
# Filter values support glob patterns (e.g., "acme-*" matches "acme-frontend", "acme-api").
customers:
  - external_id: "customer_acme"
    name: "Acme Corp"
    currency: "USD"
    # When does billing start? Events before this date are silently ignored by Lago.
    # Set to the 1st of the month you want to start billing from.
    # If omitted, defaults to the time bootstrap runs (fine for going-forward billing).
    subscription_at: "2026-01-01T00:00:00Z"
    # Tax-relevant fields (optional but recommended for tax compliance)
    email: "billing@acme.example.com"
    legal_name: "Acme Corporation Inc."
    tax_identification_number: "US12-3456789"  # EIN, VAT number, etc.
    # Assign specific tax rates by code (must exist in Lago first)
    tax_codes: ["us_standard_sales_tax"]
    address:
      address_line1: "123 Main Street"
      city: "San Francisco"
      state: "CA"
      zipcode: "94105"
      country: "US"  # ISO 3166 alpha-2
    resources:
      # Bill Acme for these two AWS accounts
      - provider: aws
        filter:
          account: ["123456789012", "234567890123"]
      # And these OpenShift namespaces on a specific cluster
      - provider: openshift
        filter:
          project: ["acme-*"]
          cluster: ["prod-cluster-01"]

  - external_id: "customer_globex"
    name: "Globex Inc"
    currency: "EUR"
    email: "finance@globex.example.de"
    legal_name: "Globex GmbH"
    tax_identification_number: "DE123456789"  # EU VAT number (enables reverse charge)
    address:
      address_line1: "Musterstraße 42"
      city: "Berlin"
      zipcode: "10115"
      country: "DE"
    resources:
      # Bill Globex by tag
      - provider: openshift
        filter:
          tag:team: ["globex-engineering"]
      - provider: aws
        filter:
          tag:customer: ["globex"]

  - external_id: "customer_initech"
    name: "Initech"
    currency: "USD"
    # No tax fields = uses billing entity default tax rate
    resources:
      # Bill Initech for specific VMs
      - provider: openshift
        filter:
          vm_name: ["initech-vm-*"]
